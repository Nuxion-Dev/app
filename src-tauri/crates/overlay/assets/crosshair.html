    <!-- Custom Grid Container -->
    <div id="grid-container" class="crosshair-svg"></div>

    <script>
        window.updateCrosshair = (config) => {
            try {
                // config: { color: string, size: number, type: string, grid: any }
                const { color, size, type, grid } = config;
                const safeColor = color || '#ff0000'; // Default to red if missing
                
                // Hide all
                const svgs = document.getElementsByClassName('crosshair-svg');
                for (let i = 0; i < svgs.length; i++) {
                    svgs[i].classList.remove('active');
                }

                let target = null;

                // Helper to convert hex to rgb for compatibility
                const hexToRgb = (hex) => {
                    // Expand shorthand form (e.g. "03F") to full form (e.g. "0033FF")
                    const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
                    hex = hex.replace(shorthandRegex, function(m, r, g, b) {
                        return r + r + g + g + b + b;
                    });

                    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                    return result ? `rgb(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)})` : hex;
                };

                const finalColor = hexToRgb(safeColor);
                console.log("Converted color:", safeColor, "->", finalColor);

                // Helper to apply color recursively - DEPRECATED by CSS injection
                const applyColor = (element, c) => {
                    // ...
                };

                // Inject dynamic style for color
                const style = document.getElementById('dynamic-style') || document.createElement('style');
                style.id = 'dynamic-style';
                style.textContent = `
                    .crosshair-svg, .crosshair-svg * {
                        fill: ${finalColor} !important;
                        stroke: ${finalColor} !important;
                        color: ${finalColor} !important;
                    }
                `;
                document.head.appendChild(style);

                if (type === 'grid' && grid) {
                    console.log("Rendering custom grid:", grid.length, "rows");
                    // Render custom grid
                    const container = document.getElementById('grid-container');
                    container.innerHTML = ''; // Clear previous
                    container.classList.add('active');
                    
                    const gridSize = grid.length;
                    const pixelSize = 10;
                    const totalSize = gridSize * pixelSize;
                    
                    const svgNS = "http://www.w3.org/2000/svg";
                    const svg = document.createElementNS(svgNS, "svg");
                    svg.setAttribute("viewBox", `0 0 ${totalSize} ${totalSize}`);
                    svg.style.width = `${size}px`;
                    svg.style.height = `${size}px`;
                    
                    grid.forEach((row, r) => {
                        row.forEach((cell, c) => {
                            if (cell) {
                                const rect = document.createElementNS(svgNS, "rect");
                                rect.setAttribute("x", c * pixelSize);
                                rect.setAttribute("y", r * pixelSize);
                                rect.setAttribute("width", pixelSize);
                                rect.setAttribute("height", pixelSize);
                                // No attributes needed, CSS handles it
                                svg.appendChild(rect);
                            }
                        });
                    });
                    
                    container.appendChild(svg);
                    target = svg;
                } else {
                    // Predefined SVG
                    const selectedId = type || 'svg1';
                    target = document.getElementById(selectedId);
                    if (target) {
                        target.classList.add('active');
                        target.style.width = `${size}px`;
                        target.style.height = `${size}px`;
                    }
                }

                if (target) {
                    // applyColor(target, finalColor); // No longer needed with CSS injection
                }
            } catch (e) {
                // Log error to console (visible in Ultralight inspector if enabled, or just swallowed)
                console.error("Error updating crosshair:", e);
            }
        };
    </script>
